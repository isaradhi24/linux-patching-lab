---
- name: Install Apache Web Server
  hosts: webservers
  become: yes

  tasks:
    - name: Update package index
      apt:
        update_cache: yes

    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Ensure Apache is running and enabled
      service:
        name: apache2
        state: started
        enabled: yes
        