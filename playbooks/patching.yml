---
# PLAY 1: Clean up the Jenkins Workspace (Runs on Windows/Controller)
- name: Pre-flight Workspace Cleanup
  hosts: localhost
  connection: local
  tasks:
    - name: Clear old reports
      shell: "rm -rf /opt/ansible-lab/artifacts"
      ignore_errors: yes

    - name: Recreate clean artifacts directory
      file:
        path: /opt/ansible-lab/artifacts
        state: directory
        mode: '0755'

# PLAY 2: Patching and Fetching (Runs on your Vagrant VMs)
- name: OS Patching and Report Collection
  hosts: all
  become: yes
  tasks:
    
    # 1 Get List of Pending Updates (Pre-patch)
    - name: Get List of Pending Updates
      shell: "apt list --upgradable | grep -v 'Listing...' || echo 'No updates remaining'"
      register: pre_patch_list
      when: ansible_distribution == "Ubuntu"
      failed_when: false  # Don't crash if no updates found

    # 2 Capture Resources (Pre-patch)
    - name: Capture Pre-check Data
      shell: "df -h / | awk 'NR==2 {print $5}'"
      register: pre_disk_usage

    # 3. Save Pre-Check to a file on the VM 
    - name: Save Pre-check to a file on the VM
      copy:
        content: "{{ pre_disk_usage.stdout }}"
        dest: "/tmp/pre_check_{{ inventory_hostname }}.txt"

    # 4. FETCH TO JENKINS 
    - name: Fetch Pre-check back to Jenkins
      fetch:
        src: "/tmp/pre_check_{{ inventory_hostname }}.txt"
        dest: "artifacts/pre-checks/"
        flat: yes

    # --- PATCHING PHASE ---
    - name: Update Ubuntu (with extra patience)
      apt:
        update_cache: yes
        upgrade: dist
        force_apt_get: yes
        dpkg_options: 'force-confold,force-confdef'
      register: apt_res
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: ansible_distribution == "Ubuntu"
      async: 1800 
      poll: 10

    - name: Update SUSE
      zypper:
        name: '*'
        state: latest
      when: ansible_os_family == "Suse"

    # --- POST-CHECK PHASE (Optional but recommended) ---
    - name: Capture Post-check Data
      shell: "df -h /boot"
      register: post_check_out

    - name: Save Post-check to file
      copy:
        content: "{{ post_check_out.stdout }}"
        dest: "/tmp/post_check_{{ inventory_hostname }}.txt"

    - name: Fetch Post-check back to Jenkins
      fetch:
        src: "/tmp/post_check_{{ inventory_hostname }}.txt"
        dest: "artifacts/post-checks/"
        flat: yes

      # Webhook automation confirmed!